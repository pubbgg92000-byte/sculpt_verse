name: Build and Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vercel-production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build, then deploy
    runs-on: ubuntu-latest

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build app
        run: npm run build

      - name: Check Vercel secrets
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "Missing GitHub secret: VERCEL_TOKEN"
            exit 1
          fi
          if [ -z "$VERCEL_ORG_ID" ]; then
            echo "Missing GitHub secret: VERCEL_ORG_ID"
            exit 1
          fi
          if [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Missing GitHub secret: VERCEL_PROJECT_ID"
            exit 1
          fi

      - name: Pull Vercel environment
        run: npx --yes vercel@54.15.0 pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build with Vercel
        run: npx --yes vercel@54.15.0 build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel
        run: npx --yes vercel@54.15.0 deploy --prebuilt --prod --token="$VERCEL_TOKEN"
